<!--
    realizé este cambio debido a que las imagenes en png son una pesima idea en el momento en el que estamos para el diseño de una web
    lo que quiero decir es que habiendo mejores opciones, el formato de imagen original (jpg y wepg) aportaba peso al renderizado, por lo que
    asignando imagenes, que en este caso son elementos embebidos en el propio codigo aporta mucha menos carga en el proceso de la web. Ademas de que
    se pueden reescalar de forma infinita sin pixelizacion y se pueden realciar un cambio de color
    
    la comparación se puede ver en el video, ya que no fui capaz de sacar el html y css de esta web, entonces la recreé como bien pude añadiendo estos cambios 
    
    Cambios Realizados:
    - transformacion de formato png a svg
    - adaptacion de la escalabilidad de las imagenes para evitar problemas de tamaño
-->
