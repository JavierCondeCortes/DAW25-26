<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repaso Intensivo DWEC - Día 3</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        /* Estilos Formulario */
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-submit { background-color: #27ae60; }
        .btn-clear { background-color: #e74c3c; }

        /* Estilos Drag and Drop */
        .drag-section { display: flex; gap: 20px; margin-top: 20px; }
        .drop-zone { flex: 1; min-height: 100px; border: 2px dashed #3498db; border-radius: 10px; padding: 10px; background: #ecf0f1; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }
        .draggable-item { width: 80px; height: 80px; background-color: #3498db; color: white; display: flex; align-items: center; text-align: center; justify-content: center; border-radius: 5px; cursor: grab; font-size: 12px; font-weight: bold; }
        .draggable-item:active { cursor: grabbing; }
        .over { border-color: #2ecc71; background-color: #d5f5e3; }

        #mensaje { margin-top: 20px; padding: 15px; border-radius: 5px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Día 3: Formularios, Storage y Drag&Drop</h1>

    <form id="registroForm">
        <div class="form-group">
            <label for="nombre">Nombre (Solo letras):</label>
            <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
        </div>

        <div class="form-group">
            <label for="dni">DNI (8 números y 1 letra):</label>
            <input type="text" id="dni" placeholder="12345678Z">
        </div>

        <div class="form-group">
            <label for="comentarios">Comentarios (Se guardan en Session):</label>
            <textarea id="comentarios" placeholder="Escribe algo temporal..."></textarea>
        </div>

        <div class="form-group">
            <label>Género (LocalStorage):</label>
            <input type="radio" name="genero" value="hombre"> Hombre
            <input type="radio" name="genero" value="mujer"> Mujer
        </div>

        <div class="form-group">
            <label>Intereses (Array JSON):</label>
            <input type="checkbox" class="interes" value="JS"> JavaScript
            <input type="checkbox" class="interes" value="PHP"> PHP
            <input type="checkbox" class="interes" value="HTML"> HTML
        </div>

        <button type="submit" class="btn btn-submit">Registrar y Guardar</button>
        <button type="button" id="borrarTodo" class="btn btn-clear">Borrar Rastro</button>
    </form>

    <div id="mensaje"></div>

    <h2>🖱️ Drag and Drop (Arrastra los módulos)</h2>
    <div class="drag-section">
        <div id="origen" class="drop-zone">
            <div id="mod1" class="draggable-item" draggable="true">Módulo A</div>
            <div id="mod2" class="draggable-item" draggable="true">Módulo B</div>
        </div>
        <div id="destino" class="drop-zone">
            <p style="color: #7f8c8d; width: 100%; text-align: center;">Zona de Destino</p>
        </div>
    </div>
</div>

<script>
    // --- 1. REFERENCIAS AL DOM ---
    const form = document.getElementById('registroForm');
    const mensajeDiv = document.getElementById('mensaje');
    const btnClear = document.getElementById('borrarTodo');

    // --- 2. FUNCIONES DE APOYO (Cookies) ---
    function gestionarCookie(nombre, valor, dias) {
        let fecha = new Date();
        fecha.setTime(fecha.getTime() + (dias * 24 * 60 * 60 * 1000));
        let expires = "expires=" + fecha.toUTCString();
        document.cookie = `${nombre}=${valor}; ${expires}; path=/`;
    }

    // --- 3. CARGA DE DATOS (ONLOAD) ---
    window.addEventListener('DOMContentLoaded', () => {
        // Recuperar LocalStorage
        document.getElementById('nombre').value = localStorage.getItem('nombre') || '';
        document.getElementById('dni').value = localStorage.getItem('dni') || '';
        
        // Recuperar SessionStorage
        document.getElementById('comentarios').value = sessionStorage.getItem('temp_comentarios') || '';

        // Recuperar Radio
        const gen = localStorage.getItem('genero');
        if (gen) {
            const radio = document.querySelector(`input[name="genero"][value="${gen}"]`);
            if (radio) radio.checked = true;
        }

        // Recuperar Checkboxes (JSON.parse)
        const intSaved = JSON.parse(localStorage.getItem('intereses') || "[]");
        intSaved.forEach(val => {
            const check = document.querySelector(`.interes[value="${val}"]`);
            if (check) check.checked = true;
        });
    });

    // --- 4. EVENTO SUBMIT (Validación y Almacenamiento) ---
    form.addEventListener('submit', (e) => {
        e.preventDefault();

        const name = document.getElementById('nombre').value;
        const dni = document.getElementById('dni').value;
        const comentarios = document.getElementById('comentarios').value;
        const genero = document.querySelector('input[name="genero"]:checked')?.value || "No definido";
        
        const intereses = Array.from(document.querySelectorAll('.interes:checked')).map(el => el.value);

        // Validaciones Regex
        const regexDNI = /^\d{8}[A-Z]$/;
        const regexNombre = /^[a-zA-ZÁÉÍÓÚáéíóúñÑ\s]+$/;

        if (!regexNombre.test(name)) return mostrarMensaje("Nombre inválido (solo letras)", "red");
        if (!regexDNI.test(dni)) return mostrarMensaje("DNI inválido (8 números y 1 letra)", "red");

        // Guardado Mixto
        localStorage.setItem('nombre', name);
        localStorage.setItem('dni', dni);
        localStorage.setItem('genero', genero);
        localStorage.setItem('intereses', JSON.stringify(intereses)); // ARRAY -> STRING

        sessionStorage.setItem('temp_comentarios', comentarios); // SESIÓN (Temporal)
        
        gestionarCookie("ultimoUsuario", name, 7); // COOKIE (7 días)

        mostrarMensaje("✅ Datos guardados con éxito en Local, Session y Cookies", "green");
    });

    function mostrarMensaje(texto, color) {
        mensajeDiv.textContent = texto;
        mensajeDiv.style.backgroundColor = color === "red" ? "#f8d7da" : "#d4edda";
        mensajeDiv.style.color = color === "red" ? "#721c24" : "#155724";
    }

    // --- 5. BORRAR RASTRO ---
    btnClear.addEventListener('click', () => {
        localStorage.clear();
        sessionStorage.clear();
        gestionarCookie("ultimoUsuario", "", -1); // Caducar cookie
        form.reset();
        mostrarMensaje("🧹 Todo rastro ha sido eliminado", "blue");
    });

    // --- 6. DRAG AND DROP COMPLETO ---
    const items = document.querySelectorAll('.draggable-item');
    const zonas = document.querySelectorAll('.drop-zone');

    items.forEach(item => {
        item.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', e.target.id);
            e.target.style.opacity = '0.4';
        });
        item.addEventListener('dragend', (e) => {
            e.target.style.opacity = '1';
        });
    });

    zonas.forEach(zona => {
        zona.addEventListener('dragover', (e) => {
            e.preventDefault(); // OBLIGATORIO
            zona.classList.add('over');
        });

        zona.addEventListener('dragleave', () => {
            zona.classList.remove('over');
        });

        zona.addEventListener('drop', (e) => {
            e.preventDefault();
            zona.classList.remove('over');
            const id = e.dataTransfer.getData('text/plain');
            const el = document.getElementById(id);
            zona.appendChild(el); // Movemos el elemento al soltarlo
        });
    });

</script>

</body>
</html>
